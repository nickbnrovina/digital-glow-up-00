<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture of the Digital World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color-start: #050510;
            --bg-color-end: #0a0a1a;
            --accent-color: #00f0ff;
            --mouse-x: 0px;
            --mouse-y: 0px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: radial-gradient(circle at center, var(--bg-color-start) 0%, var(--bg-color-end) 100%);
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            perspective: 1000px;
        }

        /* Overlay text content */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translate3d(calc(var(--mouse-x) * -0.02), calc(var(--mouse-y) * -0.02), 0);
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
            pointer-events: none;
        }

        h1 {
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(30px);
            animation: textFadeUp 0.8s ease-out 0.8s forwards;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
        }

        p.subline {
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2.5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: textFadeUp 0.8s ease-out 1.0s forwards;
        }

        .cta-btn {
            display: inline-block;
            padding: 1.2rem 2.8rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-color);
            text-decoration: none;
            border: 1px solid var(--accent-color);
            border-radius: 4px;
            background: transparent;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            pointer-events: auto;
            opacity: 0;
            transform: translateY(20px);
            animation: textFadeUp 0.8s ease-out 1.2s forwards;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1), inset 0 0 15px rgba(0, 240, 255, 0.1);
        }

        .cta-btn:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3), inset 0 0 20px rgba(0, 240, 255, 0.2);
            text-shadow: 0 0 8px var(--accent-color);
        }

        .cta-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.4), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .cta-btn:hover::before {
            left: 150%;
        }

        /* Ambient glowing shapes */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .parallax-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .layer-bg {
            transform: translate3d(calc(var(--mouse-x) * 0.01), calc(var(--mouse-y) * 0.01), -500px);
        }

        .layer-mid {
            transform: translate3d(calc(var(--mouse-x) * -0.05), calc(var(--mouse-y) * -0.05), -200px);
        }

        /* CSS Perspective Grid */
        .grid-container {
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            perspective: 600px;
            transform-style: preserve-3d;
            opacity: 0;
            animation: gridFade 1.5s ease-out 0.4s forwards;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(75deg) translateY(200px);
            mask-image: radial-gradient(ellipse at center, black 10%, transparent 60%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 10%, transparent 60%);
        }

        .grid-animation {
            width: 100%;
            height: 100%;
            animation: gridMove 5s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* Cubes */
        .shape-container {
            position: absolute;
            transform-style: preserve-3d;
            opacity: 0;
        }

        .cube {
            position: relative;
            width: 60px;
            height: 60px;
            transform-style: preserve-3d;
            animation: rotateCube 15s linear infinite;
        }

        .cube .face {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 1px solid rgba(0, 240, 255, 0.6);
            background: rgba(0, 240, 255, 0.05);
            box-shadow: inset 0 0 12px rgba(0, 240, 255, 0.2);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        .cube .front  { transform: translateZ(30px); }
        .cube .back   { transform: rotateY(180deg) translateZ(30px); }
        .cube .right  { transform: rotateY(90deg) translateZ(30px); }
        .cube .left   { transform: rotateY(-90deg) translateZ(30px); }
        .cube .top    { transform: rotateX(90deg) translateZ(30px); }
        .cube .bottom { transform: rotateX(-90deg) translateZ(30px); }

        /* Different container positions and anims */
        .sc-1 { top: 20%; left: 15%; animation: shapeIn 1s cubic-bezier(0.1, 0.8, 0.2, 1) 0.6s forwards, float 6s ease-in-out infinite alternate; }
        .sc-2 { top: 70%; left: 25%; animation: shapeIn 1s cubic-bezier(0.1, 0.8, 0.2, 1) 0.8s forwards, float 8s ease-in-out infinite alternate-reverse; }
        .sc-2 .cube { transform: scale(1.5); animation-duration: 25s; animation-direction: reverse; }
        
        .sc-3 { top: 30%; left: 80%; animation: shapeIn 1s cubic-bezier(0.1, 0.8, 0.2, 1) 0.9s forwards, float 7s ease-in-out infinite alternate; }
        .sc-3 .cube { transform: scale(0.8); animation-duration: 18s; }
        
        .sc-4 { top: 75%; left: 75%; animation: shapeIn 1s cubic-bezier(0.1, 0.8, 0.2, 1) 1.0s forwards, float 9s ease-in-out infinite alternate-reverse; }
        .sc-4 .cube { transform: scale(1.2); animation-duration: 22s; animation-direction: reverse; }
        
        .sc-5 { top: 10%; left: 60%; animation: shapeIn 1s cubic-bezier(0.1, 0.8, 0.2, 1) 1.2s forwards, float 10s ease-in-out infinite alternate; }
        .sc-5 .cube { transform: scale(0.5); animation-duration: 15s; }

        @keyframes rotateCube {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(var(--scale, 1)); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(180deg) scale(var(--scale, 1)); }
        }

        @keyframes float {
            0% { transform: translateY(0px) rotateZ(0deg); }
            100% { transform: translateY(40px) rotateZ(10deg); }
        }

        @keyframes textFadeUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes gridFade {
            0% { opacity: 0; }
            100% { opacity: 0.8; }
        }

        @keyframes shapeIn {
            0% { opacity: 0; transform: translateZ(-800px); }
            100% { opacity: 1; transform: translateZ(0); }
        }

        /* Overlays */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.15));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        .noise {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .glow-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80%;
            height: 80%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at center, rgba(0, 240, 255, 0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: screen;
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="scanlines"></div>
    
    <div class="scene" id="scene">
        <!-- Background Grid Parallax -->
        <div class="parallax-layer layer-bg">
            <div class="grid-container">
                <div class="grid-animation"></div>
            </div>
            <div class="glow-overlay"></div>
        </div>

        <!-- Mid Layer Floating Shapes Parallax -->
        <div class="parallax-layer layer-mid">
            <div class="shape-container sc-1">
                <div class="cube" style="--scale: 1;">
                    <div class="face front"></div><div class="face back"></div>
                    <div class="face right"></div><div class="face left"></div>
                    <div class="face top"></div><div class="face bottom"></div>
                </div>
            </div>
            
            <div class="shape-container sc-2">
                <div class="cube" style="--scale: 1.5;">
                    <div class="face front"></div><div class="face back"></div>
                    <div class="face right"></div><div class="face left"></div>
                    <div class="face top"></div><div class="face bottom"></div>
                </div>
            </div>

            <div class="shape-container sc-3">
                <div class="cube" style="--scale: 0.8;">
                    <div class="face front"></div><div class="face back"></div>
                    <div class="face right"></div><div class="face left"></div>
                    <div class="face top"></div><div class="face bottom"></div>
                </div>
            </div>

            <div class="shape-container sc-4">
                <div class="cube" style="--scale: 1.2;">
                    <div class="face front"></div><div class="face back"></div>
                    <div class="face right"></div><div class="face left"></div>
                    <div class="face top"></div><div class="face bottom"></div>
                </div>
            </div>

            <div class="shape-container sc-5">
                <div class="cube" style="--scale: 0.5;">
                    <div class="face front"></div><div class="face back"></div>
                    <div class="face right"></div><div class="face left"></div>
                    <div class="face top"></div><div class="face bottom"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Foreground Content -->
    <main class="content">
        <h1>We Build the Digital Infrastructure of Tomorrow</h1>
        <p class="subline">Strategy &middot; Design &middot; Technology &mdash; built for scale</p>
        <a href="#start" class="cta-btn">Start a project &rarr;</a>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const root = document.documentElement;
            // Center variables
            let cx = window.innerWidth / 2;
            let cy = window.innerHeight / 2;
            
            // Re-calc center on resize
            window.addEventListener('resize', () => {
                cx = window.innerWidth / 2;
                cy = window.innerHeight / 2;
            });

            // Listen to mousemove for parallax effect
            document.addEventListener('mousemove', (e) => {
                const clientX = e.clientX;
                const clientY = e.clientY;
                
                // Calculate distance from center
                const dx = clientX - cx;
                const dy = clientY - cy;

                // Set CSS variables for smooth translation
                root.style.setProperty('--mouse-x', `${dx}px`);
                root.style.setProperty('--mouse-y', `${dy}px`);
            });
        });
    </script>
</body>
</html>
