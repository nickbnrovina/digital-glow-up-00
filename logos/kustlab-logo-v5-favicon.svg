<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00ebd3"/>
      <stop offset="100%" stop-color="#ff5200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');
      .k-letter {
        font-family: 'Outfit', 'Arial Black', sans-serif;
        font-weight: 800;
        font-size: 52px;
      }
    </style>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0a0a0e"/>
  <!-- Outer glow border -->
  <rect x="3" y="3" width="94" height="94" rx="18"
        fill="none"
        stroke="#00ebd3"
        stroke-width="1.5"
        stroke-opacity="0.6"
        filter="url(#glow)"/>
  <!-- Inner glass -->
  <rect x="3" y="3" width="94" height="94" rx="18"
        fill="rgba(0,235,211,0.04)"/>
  <!-- K letter -->
  <text class="k-letter" x="50" y="70" text-anchor="middle" fill="url(#iconGrad)">K</text>
</svg>
