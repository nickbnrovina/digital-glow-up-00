<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00ebd3"/>
      <stop offset="25%"  stop-color="#61c87a"/>
      <stop offset="50%"  stop-color="#a5b55e"/>
      <stop offset="75%"  stop-color="#ff8a00"/>
      <stop offset="100%" stop-color="#ff5200"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');
      .badge-text {
        font-family: 'Outfit', 'Arial Black', sans-serif;
        font-weight: 800;
        font-size: 30px;
        letter-spacing: 4px;
      }
    </style>
  </defs>
  <rect width="320" height="80" fill="none"/>
  <!-- Glass card -->
  <rect x="10" y="10" width="300" height="60" rx="20"
        fill="rgba(255,255,255,0.02)"
        stroke="rgba(255,255,255,0.08)"
        stroke-width="1"/>
  <!-- Badge text -->
  <text class="badge-text" x="160" y="51" text-anchor="middle" fill="url(#brandGrad)">KUSTLAB.</text>
</svg>
